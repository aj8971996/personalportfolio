<header class="site-header">
  <div class="header-inner">

    <a routerLink="/" class="logo" (click)="closeMenu()">
      <span class="logo-mark">AB</span>
      <span class="logo-dot"></span>
    </a>

    <nav class="desktop-nav">
      <a routerLink="/"
         routerLinkActive="nav-active"
         [routerLinkActiveOptions]="{exact: true}"
         class="nav-link">Home</a>
      <a routerLink="/approach"
         routerLinkActive="nav-active"
         class="nav-link">Approach</a>
      <a href="/assets/art/threshold-current.html"
         target="_blank"
         rel="noopener noreferrer"
         class="nav-art">Play With Algorithmic Art ↗</a>
      <a routerLink="/resume" class="nav-resume">Resume →</a>
    </nav>

    <button class="mobile-toggle"
            (click)="toggleMenu()"
            [attr.aria-expanded]="isMenuOpen"
            aria-label="Toggle navigation">
      @if (!isMenuOpen) {
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
          <path d="M3 6h16M3 11h16M3 16h16" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
        </svg>
      } @else {
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
          <path d="M5 5l12 12M17 5L5 17" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
        </svg>
      }
    </button>
  </div>

  @if (isMenuOpen) {
    <nav class="mobile-nav" aria-label="Mobile navigation">
      <a routerLink="/"
         routerLinkActive="nav-active"
         [routerLinkActiveOptions]="{exact: true}"
         class="mobile-nav-link"
         (click)="closeMenu()">Home</a>
      <a routerLink="/approach"
         routerLinkActive="nav-active"
         class="mobile-nav-link"
         (click)="closeMenu()">Approach</a>
      <a href="/assets/art/threshold-current.html"
         target="_blank"
         rel="noopener noreferrer"
         class="mobile-nav-link mobile-art"
         (click)="closeMenu()">Play With Algorithmic Art ↗</a>
      <a routerLink="/resume"
         class="mobile-nav-link mobile-resume"
         (click)="closeMenu()">Resume →</a>
    </nav>
  }
</header>
