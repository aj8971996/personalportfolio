<div class="term-panel" (click)="focusInput()">

  <!-- Chrome bar -->
  <div class="term-chrome" aria-hidden="true">
    <div class="term-dots">
      <span class="dot-close"></span>
      <span class="dot-min"></span>
      <span class="dot-max"></span>
    </div>
    <span class="term-chrome-title">alex&#64;portfolio:~</span>
  </div>

  <!-- Output + input body -->
  <div class="term-body" #outputBody role="log" aria-label="Terminal output" aria-live="polite">

    <!-- Startup typewriter line -->
    @if (typingText()) {
      <div class="term-line term-line--prompt" aria-hidden="true">{{ typingText() }}<span class="term-cursor"></span></div>
    }

    <!-- History of executed commands and their output -->
    @for (line of outputLines(); track $index) {
      <div [class]="'term-line term-line--' + line.type">{{ line.text }}</div>
    }

    <!-- Interactive prompt — hidden during startup typewriter -->
    @if (isReady()) {
      <div class="term-input-row">
        <span class="term-prompt-label" aria-hidden="true">alex&#64;portfolio:~$</span>
        <input
          #termInput
          class="term-input"
          type="text"
          [value]="inputValue()"
          (input)="onInput($event)"
          (keydown)="onKeydown($event)"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="none"
          spellcheck="false"
          aria-label="Terminal input. Type help for available commands."
        />
      </div>
    }

  </div>
</div>
