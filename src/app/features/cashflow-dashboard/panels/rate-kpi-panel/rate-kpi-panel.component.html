<div class="cf-kpi-grid">
  @if (!loaded()) {
    @for (i of [1,2,3,4]; track i) {
      <div class="cf-kpi-card">
        <div class="cf-skeleton" style="height: 110px"></div>
      </div>
    }
  } @else {
    @for (card of kpiCards(); track card.label) {
      <div class="cf-kpi-card">
        <span class="cf-kpi-label">{{ card.label }}</span>

        <div class="cf-kpi-value-row">
          <span class="cf-kpi-value">{{ card.value }}</span>
          <span class="cf-kpi-unit">{{ card.unit }}</span>
        </div>

        <svg viewBox="0 0 120 48" class="cf-kpi-spark" aria-hidden="true" preserveAspectRatio="none">
          <polyline
            [attr.points]="toSparkPoints(card.sparkData)"
            fill="none"
            [attr.stroke]="card.sparkColor"
            stroke-width="1.75"
            stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>

        <div class="cf-kpi-status-row">
          <span class="w-2 h-2 rounded-full flex-shrink-0" [class]="statusDotClass(card.status)"></span>
          <span class="cf-status-text" [class]="statusTextClass(card.status)">{{ card.statusLabel }}</span>
        </div>
        <p class="cf-kpi-footnote">{{ card.footnote }}</p>
      </div>
    }
  }
</div>
