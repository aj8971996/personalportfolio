<div class="grid grid-cols-2 md:grid-cols-4 gap-4">
  @if (!loaded()) {
    @for (i of [1,2,3,4]; track i) {
      <div class="bg-white rounded-xl shadow-sm ring-1 ring-gray-100 p-5">
        <div class="animate-pulse space-y-2">
          <div class="h-3 bg-gray-100 rounded w-3/4"></div>
          <div class="h-8 bg-gray-100 rounded w-1/2"></div>
          <div class="h-12 bg-gray-100 rounded"></div>
        </div>
      </div>
    }
  } @else {
    @for (card of kpiCards(); track card.label) {
      <div class="bg-white rounded-xl shadow-sm ring-1 ring-gray-100 p-5 flex flex-col gap-1">
        <span class="text-gray-500 text-sm">{{ card.label }}</span>

        <div class="flex items-baseline gap-1">
          <span class="text-2xl font-semibold text-gray-900">{{ card.value }}</span>
          <span class="text-sm text-gray-400">{{ card.unit }}</span>
        </div>

        <!-- SVG Sparkline -->
        <svg viewBox="0 0 120 48" class="w-full" style="height:48px" aria-hidden="true" preserveAspectRatio="none">
          <polyline
            [attr.points]="toSparkPoints(card.sparkData)"
            fill="none"
            [attr.stroke]="card.sparkColor"
            stroke-width="1.75"
            stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>

        <div class="flex items-center gap-1.5 mt-0.5">
          <span class="w-2 h-2 rounded-full flex-shrink-0" [class]="statusDotClass(card.status)"></span>
          <span class="text-xs font-medium" [class]="statusTextClass(card.status)">{{ card.statusLabel }}</span>
        </div>
        <p class="text-xs text-gray-400 leading-tight">{{ card.footnote }}</p>
      </div>
    }
  }
</div>
