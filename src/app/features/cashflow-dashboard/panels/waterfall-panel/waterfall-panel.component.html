<div class="cf-panel">
  <div class="cf-panel-header">
    <div>
      <h2 class="cf-panel-title">Cash Flow Waterfall</h2>
      <p class="cf-panel-caption">Net weekly inflows (green) and outflows (red) for the selected period.</p>
    </div>
    @if (loaded()) {
      <select
        class="cf-select"
        [value]="currentPeriod()"
        (change)="selectPeriod($any($event.target).value)">
        @for (p of availablePeriods(); track p) {
          <option [value]="p">{{ p }}</option>
        }
      </select>
    }
  </div>

  @if (!loaded()) {
    <div class="cf-skeleton" style="height:400px"></div>
  } @else {
    <div echarts [options]="chartOptions()" style="height:400px"></div>
  }

  <p class="cf-panel-note">
    Synthetic weekly cash flows · Period: {{ currentPeriod() }} · Green = net inflows · Red = net outflows
  </p>
</div>
